---
# tasks file for ansible-role-laniakea-rstudio-express-config

- name: Create or update RStudio user and password
  import_tasks: rstudio_user.yml

- name: Start rstudio-server
  systemd:
    state: started
    enabled: yes
    name: rstudio-server.service
  become: yes

- name: Wait RStudio
  wait_for:
    host: 127.0.0.1
    port: '8080'
    timeout: 300
